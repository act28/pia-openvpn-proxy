services:
  vpn_proxy:
    image: docker.io/act28/pia-openvpn-proxy
    cap_drop:
      - ALL
    cap_add:
      - MKNOD # Required by OVPN only to create tun0 node
      - NET_ADMIN # Required by OVPN & WG for network config
      - NET_RAW # Required for raw sockets
    devices:
      - /dev/net/tun # Only for OVPN
    dns:
      - 209.222.18.218
      - 209.222.18.222
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${VPN_PROXY_CONFIG}:/config
    # If using WireGuard, uncomment the next 3 lines
    #sysctls:
    #  - net.ipv4.conf.all.src_valid_mark=1
    #privileged: true
    environment:
      - VPN_PROTOCOL=${VPN_PROTOCOL}
      - REGION=${REGION}
      - USERNAME=${PIA_USERNAME}
      - PASSWORD=${PIA_PASSWORD}
      - UID=${UID}
      - GID=${GID}
      - LOCAL_NETWORK=${LOCAL_NET}/24
    networks:
      - vpn_proxy
    ports:
      - 8118:8118
      - 1080:1080/tcp
      - 1080:1080/udp
    restart: always

networks:
  vpn_proxy:
